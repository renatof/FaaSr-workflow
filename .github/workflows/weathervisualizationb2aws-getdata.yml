name: weathervisualizationb2aws-getdata

on:
    workflow_dispatch:
        inputs:
            OVERWRITTEN:
                description: "Overwritten fields"
                required: true
            PAYLOAD_URL:
                description: "URL to payload"
                required: true

jobs:
    run_docker_image:
        runs-on: ubuntu-latest
        container: ghcr.io/faasr/github-actions-python:2.0.5

        env:
            AWS_AccessKey: ${{ secrets.AWS_AccessKey}}
            AWS_SecretKey: ${{ secrets.AWS_SecretKey}}
            GH_PAT: ${{ secrets.GH_PAT}}
            B2_AccessKey: ${{ secrets.B2_AccessKey}}
            B2_SecretKey: ${{ secrets.B2_SecretKey}}
            OVERWRITTEN: ${{ github.event.inputs.OVERWRITTEN }}
            PAYLOAD_URL: ${{ github.event.inputs.PAYLOAD_URL }}

        steps:
          - name: Run Python entrypoint
            run: |
                cd /action
                python3 faasr_entry.py
